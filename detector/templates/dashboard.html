<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Infra AI | Pothole Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0d1117; /* GitHub Dark theme background */
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Header Styling */
        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #00ffcc; /* Neon Cyan */
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            letter-spacing: 2px;
        }

        .header p {
            color: #8b949e;
            margin-top: 5px;
        }

        /* Main Glass Card */
        .glass-card {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeInUp 1s ease;
        }

        /* Custom File Input */
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .file-upload-wrapper input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            border: 2px dashed #30363d;
            border-radius: 15px;
            padding: 30px;
            display: block;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .custom-file-upload:hover {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.05);
        }

        .custom-file-upload i {
            font-size: 40px;
            color: #00ffcc;
            margin-bottom: 10px;
            display: block;
        }

        /* Preview Image */
        #imagePreview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            display: none;
            margin: 20px auto;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }

        /* Scan Button */
        .btn-scan {
            background: linear-gradient(45deg, #00ffcc, #00b3ff);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-scan:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
        }

        /* Results Section */
        .result-section {
            margin-top: 40px;
            width: 100%;
            max-width: 800px;
            animation: fadeIn 1s ease;
        }

        .result-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .result-header {
            background: #e5534b; /* Alert Red */
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .result-card img {
            width: 100%;
            display: block;
        }

        /* Loading Spinner */
        #loader {
            display: none;
            margin-top: 20px;
            color: #00ffcc;
            font-weight: 600;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #00ffcc;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="header">
        <h1>🚧 Smart Infra AI</h1>
        <p>Powered by YOLOv8 Computer Vision</p>
    </div>

    <div class="glass-card">
        <form method="POST" enctype="multipart/form-data" id="uploadForm">
            {% csrf_token %}
            
            <div class="file-upload-wrapper">
                <label for="road_image" class="custom-file-upload">
                    <span style="font-size: 2rem;">📸</span><br>
                    <span id="fileName">Click to Upload Road Image</span>
                </label>
                <input type="file" id="road_image" name="road_image" accept="image/*" required onchange="previewImage(event)">
            </div>

            <img id="imagePreview" src="#" alt="Image Preview">

            <button type="submit" class="btn-scan" onclick="showLoader()">Run AI Scan</button>

            <div id="loader">
                <div class="spinner"></div>
                <p>Analyzing pixels... Please wait</p>
            </div>
        </form>
    </div>

    {% if result_img %}
    <div class="result-section">
        <div class="result-card">
            <div class="result-header">
                ⚠️ POTHOLES DETECTED
            </div>
            <img src="{{ result_img }}" alt="AI Pothole Detection Result">
        </div>
    </div>
    {% endif %}

    <script>
        // Photo select karte hi preview dikhana
        function previewImage(event) {
            var reader = new FileReader();
            reader.onload = function() {
                var output = document.getElementById('imagePreview');
                output.src = reader.result;
                output.style.display = 'block';
            }
            reader.readAsDataURL(event.target.files[0]);
            
            // File ka naam change karna
            var fileName = event.target.files[0].name;
            document.getElementById('fileName').innerText = fileName;
            document.getElementById('fileName').style.color = '#00ffcc';
        }

        // Button click par loading animation dikhana
        function showLoader() {
            var fileInput = document.getElementById('road_image').value;
            if(fileInput) { // Sirf tab load ho jab photo select ki ho
                document.getElementById('loader').style.display = 'block';
                document.querySelector('.btn-scan').style.display = 'none';
            }
        }
    </script>

</body>
</html>
